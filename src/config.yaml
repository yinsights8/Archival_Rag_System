# Archival RAG System Configuration

# Retrieval Settings
retrieval:
  top_k: 15
  embedding_model: "BAAI/bge-small-en-v1.5"

# Generation Settings
generation:
  llm_model: "meta-llama/llama-3.1-70b-instruct" # "qwen/qwen3-next-80b-a3b-instruct:free" # "google/gemma-3-4b-it:free" #"meta-llama/llama-3.1-70b-instruct"
  temperature: 0.2
  provider: "OpenRouter"
  base_url: "https://openrouter.ai/api/v1"
  hub_handle: "system_prompt" # LangSmith Hub handle from user screenshot
  max_retries: 3
  rpm_limit: 10 # Requests per minute (adjust based on your tier)

# Compression Settings
compression:
  mode: "abstractive" # options: none, extractive, abstractive
  top_k: 15
  hub_handle: "recomp_prompt" # Placeholder handle
  extractive_model: "fangyuan/nq_extractive_compressor"
  abstractive_model: "fangyuan/nq_abstractive_compressor"

# Evaluation Settings
evaluation:
  queries_file: "data/queries/rag_questions.json"
  output_dir: "results"
